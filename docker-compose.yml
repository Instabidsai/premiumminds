version: "3.9"

services:
  # ─── Graph DB ────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    container_name: groupmind-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/groupmind123
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

  # ─── Graphiti server (stock zepai/graphiti) ──────────────────────
  graphiti-mcp:
    image: zepai/graphiti:latest
    container_name: groupmind-graphiti-mcp
    depends_on:
      - neo4j
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: groupmind123
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      MODEL_NAME: ${GRAPHITI_MODEL:-gpt-4.1-mini}
    ports:
      - "8000:8000"
    restart: unless-stopped

  # ─── Cartographer worker ─────────────────────────────────────────
  cartographer:
    build: ./cartographer
    container_name: groupmind-cartographer
    depends_on:
      - graphiti-mcp
    environment:
      SUPABASE_URL: "https://tnlboqlzhrbxphlcuoux.supabase.co"
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      GRAPHITI_MCP_URL: http://graphiti-mcp:8000
    restart: unless-stopped

  # ─── GroupMind custom MCP server ─────────────────────────────────
  mcp-groupmind:
    build: ./mcp_groupmind
    container_name: groupmind-mcp
    depends_on:
      - graphiti-mcp
    environment:
      SUPABASE_URL: "https://tnlboqlzhrbxphlcuoux.supabase.co"
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      GRAPHITI_MCP_URL: http://graphiti-mcp:8000
    ports:
      - "8001:8001"
    restart: unless-stopped

  # ─── Feeds fetcher ──────────────────────────────────────────────
  fetcher:
    build: ./feeds/fetcher
    container_name: groupmind-fetcher
    environment:
      SUPABASE_URL: "https://tnlboqlzhrbxphlcuoux.supabase.co"
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      FETCHER_HEARTBEAT_SECONDS: "300"
    restart: unless-stopped

  # ─── Feeds reader (LLM extraction) ─────────────────────────────
  reader:
    build: ./feeds/reader
    container_name: groupmind-reader
    environment:
      SUPABASE_URL: "https://tnlboqlzhrbxphlcuoux.supabase.co"
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      READER_MODEL: claude-haiku-4-5-20251001
      READER_OWNER_HANDLE: system
    restart: unless-stopped

volumes:
  neo4j_data:
