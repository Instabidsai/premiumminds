version: "3.9"

services:
  # ─── Graph DB ────────────────────────────────────────────────────
  falkordb:
    image: falkordb/falkordb:latest
    container_name: groupmind-falkordb
    ports:
      - "6379:6379"
      - "3000:3000"
    volumes:
      - falkordb_data:/data
    restart: unless-stopped

  # ─── Graphiti MCP server (stock, from getzep/graphiti) ───────────
  graphiti-mcp:
    image: zepai/graphiti-mcp:latest
    container_name: groupmind-graphiti-mcp
    depends_on:
      - falkordb
    environment:
      FALKORDB_URI: redis://falkordb:6379
      FALKORDB_PASSWORD: ""
      FALKORDB_DATABASE: groupmind
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      MODEL_NAME: ${GRAPHITI_MODEL:-gpt-4.1-mini}
      GRAPHITI_GROUP_ID: main
    ports:
      - "8000:8000"
    restart: unless-stopped

  # ─── Cartographer worker ─────────────────────────────────────────
  cartographer:
    build: ./cartographer
    container_name: groupmind-cartographer
    depends_on:
      - graphiti-mcp
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      GRAPHITI_MCP_URL: http://graphiti-mcp:8000/mcp/
    restart: unless-stopped

  # ─── GroupMind custom MCP server ─────────────────────────────────
  mcp-groupmind:
    build: ./mcp_groupmind
    container_name: groupmind-mcp
    depends_on:
      - graphiti-mcp
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      GRAPHITI_MCP_URL: http://graphiti-mcp:8000/mcp/
    ports:
      - "8001:8001"
    restart: unless-stopped

  # ─── Feeds fetcher ──────────────────────────────────────────────
  fetcher:
    build: ./feeds/fetcher
    container_name: groupmind-fetcher
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      FETCHER_HEARTBEAT_SECONDS: "300"
    restart: unless-stopped

  # ─── Feeds reader (LLM extraction) ─────────────────────────────
  reader:
    build: ./feeds/reader
    container_name: groupmind-reader
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      READER_MODEL: claude-haiku-4-5-20251001
      READER_OWNER_HANDLE: system
    restart: unless-stopped

volumes:
  falkordb_data:
